<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chorono - Interactive Controls</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #333;
    }
    canvas {
      width: 100%;
      max-width: 800px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: block;
      margin: 20px 0;
    }
    .control-group {
      margin: 20px 0;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    .control-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 500;
      color: #333;
    }
    button, input {
      padding: 8px 12px;
      margin: 5px 5px 5px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
    }
    button:hover {
      background: #5568d3;
    }
    input[type="range"] {
      width: 300px;
      max-width: 100%;
    }
    .info {
      background: #e8f4f8;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chorono Runtime - Interactive Controls</h1>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="control-group">
      <label>Playback Controls</label>
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
      <button id="stopBtn">Stop</button>
    </div>

    <div class="control-group">
      <label for="speed">Playback Speed: <span id="speedVal">1.0x</span></label>
      <input type="range" id="speed" min="0.25" max="2" step="0.25" value="1" />
    </div>

    <div class="control-group">
      <label for="seek">Seek Timeline:</label>
      <input type="range" id="seek" min="0" max="3000" value="0" />
      <span id="timeDisplay">0.00s</span>
    </div>

    <div class="info">
      <strong>Interactive controls example:</strong> Play/pause buttons, speed slider, and timeline scrubbing.
      Open the console to see events being logged.
    </div>
  </div>

  <script src="https://unpkg.com/@chorono/runtime@0.1.0/dist/chorono-runtime.global.js"></script>
  <script>
    // Minimal scene for demo
    const scene = {
      id: 'interactive-demo',
      name: 'Interactive Controls',
      durationMs: 3000,
      width: 800,
      height: 600,
      layers: [],
      timelines: [],
      stateMachines: [],
      assets: []
    }

    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')

    const Chorono = window.Chorono
    const adapter = new Chorono.CanvasRenderAdapter(ctx)
    const player = new Chorono.ChronoPlayer(scene, adapter)

    // Controls
    document.getElementById('playBtn').onclick = () => {
      player.play()
      console.log('Playing...')
    }
    document.getElementById('pauseBtn').onclick = () => {
      player.pause()
      console.log('Paused')
    }
    document.getElementById('stopBtn').onclick = () => {
      player.stop()
      console.log('Stopped')
    }

    document.getElementById('speed').oninput = (e) => {
      const speed = parseFloat(e.target.value)
      document.getElementById('speedVal').textContent = speed.toFixed(2) + 'x'
      // Speed adjustment would be implemented in player
    }

    document.getElementById('seek').oninput = (e) => {
      const timeMs = parseFloat(e.target.value)
      player.seek(timeMs)
      document.getElementById('timeDisplay').textContent = (timeMs / 1000).toFixed(2) + 's'
    }

    player.on('tick', ({ currentTimeMs }) => {
      document.getElementById('seek').value = currentTimeMs
      document.getElementById('timeDisplay').textContent = (currentTimeMs / 1000).toFixed(2) + 's'
    })

    console.log('Interactive controls demo ready. Try the buttons above!')
  </script>
</body>
</html>
