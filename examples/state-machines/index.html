<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chorono - State Machine Example</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 { color: #333; }
    canvas {
      width: 100%;
      max-width: 800px;
      border: 1px solid #ddd;
      border-radius: 8px;
      display: block;
      margin: 20px 0;
    }
    .state-display {
      background: #e8f4f8;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 16px;
    }
    .state-label {
      font-weight: bold;
      color: #667eea;
    }
    .events {
      margin: 20px 0;
    }
    .events button {
      padding: 10px 16px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    .events button:hover {
      background: #5568d3;
    }
    .info {
      background: #fff3cd;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Chorono Runtime - State Machine Example</h1>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="state-display">
      <p>Current State: <span class="state-label" id="currentState">idle</span></p>
    </div>

    <div class="events">
      <h3>Dispatch Events:</h3>
      <button id="eventBtn1">Trigger Event 1</button>
      <button id="eventBtn2">Trigger Event 2</button>
      <button id="resetBtn">Reset State</button>
    </div>

    <div class="info">
      <strong>State Machine Example:</strong> Click buttons to dispatch events to the state machine.
      Watch the state display update as transitions occur.
    </div>
  </div>

  <script src="https://unpkg.com/@chorono/runtime@0.1.0/dist/chorono-runtime.global.js"></script>
  <script>
    // Minimal scene with state machine
    const scene = {
      id: 'state-machine-demo',
      name: 'State Machine Example',
      durationMs: 3000,
      width: 800,
      height: 600,
      layers: [],
      timelines: [],
      stateMachines: [
        {
          id: 'demo-machine',
          label: 'Demo Machine',
          initialState: 'idle',
          states: [
            { id: 'idle', label: 'Idle', timeline: null },
            { id: 'state1', label: 'State 1', timeline: null },
            { id: 'state2', label: 'State 2', timeline: null }
          ],
          transitions: [
            { from: 'idle', to: 'state1', trigger: 'event1', duration: 300 },
            { from: 'state1', to: 'state2', trigger: 'event2', duration: 300 },
            { from: 'state2', to: 'idle', trigger: 'reset', duration: 300 },
            { from: 'state1', to: 'idle', trigger: 'reset', duration: 300 }
          ]
        }
      ],
      assets: []
    }

    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')

    const Chorono = window.Chorono
    const adapter = new Chorono.CanvasRenderAdapter(ctx)
    const player = new Chorono.ChronoPlayer(scene, adapter)

    // Display current state
    function updateStateDisplay() {
      const sm = player.getStateMachine('demo-machine')
      if (sm) {
        document.getElementById('currentState').textContent = sm.currentStateId
      }
    }

    // Event listeners
    document.getElementById('eventBtn1').onclick = () => {
      player.dispatch('event1', 'demo-machine')
      console.log('Dispatched: event1')
      updateStateDisplay()
    }

    document.getElementById('eventBtn2').onclick = () => {
      player.dispatch('event2', 'demo-machine')
      console.log('Dispatched: event2')
      updateStateDisplay()
    }

    document.getElementById('resetBtn').onclick = () => {
      player.dispatch('reset', 'demo-machine')
      console.log('Dispatched: reset')
      updateStateDisplay()
    }

    // Listen to state changes
    player.on('stateChange', ({ smId, oldStateId, newStateId }) => {
      console.log(`State changed: ${oldStateId} → ${newStateId}`)
      updateStateDisplay()
    })

    updateStateDisplay()
    console.log('State machine demo ready!')
  </script>
</body>
</html>
